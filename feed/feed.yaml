  description: "Over the past year, U.S. trade policy with China has undergone enormous\
    \ changes, but with surprisingly little effect on overall trade balances. In fact,\
    \ the U.S.\u2019s twelve-month trade deficit, while highly volatile due to import\
    \ front-running early in the year, ended 2025 at $1.2\_trillion, almost unchanged\
    \ from 2024. At the same time, China\u2019s trade surplus with the world actually\
    \ increased from $1 trillion to $1.2\_trillion. However, when looking at changes\
    \ between individual countries, one sees large shifts in bilateral balances. In\
    \ this post, we will focus on changing trade flows between the U.S., China, and\
    \ southeast Asia."
