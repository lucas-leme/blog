  description: In the third quarter of 2025, America's largest tech firms for the
    first time spent more on capital investment than they earned from operations.
    The implication is that AI, a technology with the potential to make the economy
    more productive, is, for now, absorbing resources faster than it is generating
    returns. This post discusses how the tension between AI's long-run promise and
    its short-run costs affects the outlooks for inflation, real activity, and financial
    stability.
