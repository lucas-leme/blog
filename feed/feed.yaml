  description: Since 2018, more than thirty states have legalized mobile sports betting,
    leading to more than a half trillion dollars in wagers. In our recent <a href="https://www.newyorkfed.org/medialibrary/media/research/staff_reports/sr1184.pdf"
    rel="noreferrer noopener" target="_blank">Staff Report</a>, we examine how legalized
    sports betting affects household financial health by comparing betting activity
    and consumer credit outcomes between states that legalized to those that have
    not. We find that legalization increases spending at online sportsbooks roughly
    tenfold, but betting does not stop at state boundaries. Nearby areas where betting
    is not legal still experience roughly 15 percent the increase of counties where
    it is legal. At the same time, consumer financial health suffers. Our analysis
    finds rising delinquencies in participating states, with spillover effects across
    state lines. What is more, even though the share of people taking up sports betting
    after legalization is small (roughly 3 percent of the population), overall credit
    delinquency rises by about 0.3 percentage points. Our findings suggest that sports
    betting can have dramatic implications for household financial stability.
