    \ do Banco Central, Gustavo tornou-se s\xF3cio-fundador e conselheiro da Rio Bravo\
    \ Investimentos. Como investidor e pensador econ\xF4mico, o Gustavo \xE9 uma das\
    \ vozes mais respeitadas e provocativas sobre infla\xE7\xE3o, disciplina fiscal\
