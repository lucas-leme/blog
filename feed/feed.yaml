  description: "The global corporate nonfinancial bond market is both a large investment\
    \ asset class and a vital source of funding for nonfinancial firms. With $19 trillion\
    \ outstanding at the end of 2024, a broad portfolio of corporate bonds would be\
    \ expected to be well diversified. Yet, in 37 percent of months between 1998 and\
    \ 2024, more than 80 percent of bonds in the ICE Global Bond Indices\u2014a portfolio\
    \ with over 10,000 constituents spanning diverse industries, credit ratings, and\
    \ regions\u2014moved in the same direction, suggesting a large degree of synchronization.\
    \ In this post, we introduce the global credit factor, which proxies for the global\
    \ price of risk in international corporate bond markets. The global credit factor\
    \ creates a global credit cycle in bond risk premia and generates predictable\
    \ comovement in bond prices."
