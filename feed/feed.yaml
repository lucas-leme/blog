  date: '2026-06-03T11:01:00+00:00'
  description: "Several states have recently capped consumer loan rates with the stated\
    \ purpose of protecting borrowers. In a recent <a href=\"https://www.newyorkfed.org/research/staff_reports/sr1173\"\
    >Staff Report</a>, we study how these interventions have played out in three states.\
    \ In <a href=\"https://libertystreeteconomics.newyorkfed.org/2026/06/the-unintended-effects-of-interest-rate-caps-credit-rationing-for-risky-borrowers\"\
    >our first post about that study</a>, we showed that rate caps lead riskier borrowers\
    \ to face rationing in the credit market. One question that naturally arises is\
    \ what lenders do with the credit they used to provide to high-risk borrowers\
    \ before the caps were imposed. Lenders that lend exclusively to high-risk borrowers\
    \ (at rates above the cap) may decide to stop lending to high-risk borrowers in\
    \ that state. Others, however, may try to change their \u201Ccredit box\u201D\
    \ by lending more to somewhat safer borrowers. In this post, we will try to understand\
    \ how lenders reallocate credit after usury limits are implemented."
