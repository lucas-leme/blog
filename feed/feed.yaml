- author: Comunicados Copom
  categories:
  - Bacen
  - BC
  date: '2026-07-18T22:09:53.193606'
  description: "<div class=\"ExternalClass9252F716D398424A876A7BD09BD8A092\"><p>\u200B\
    O ambiente externo permanece incerto em fun\xE7\xE3o da indefini\xE7\xE3o sobre\
    \ os termos do acordo para cessar os conflitos armados no Oriente M\xE9dio e as\
    \ consequ\xEAncias dos efeitos j\xE1 materializados desses conflitos at\xE9 o\
    \ momento, com reflexos nas condi\xE7\xF5es financeiras globais. Tal cen\xE1rio\
    \ exige cautela por parte de pa\xEDses emergentes em ambiente marcado por eleva\xE7\
    \xE3o da volatilidade de pre\xE7os de ativos e <em>commodities</em>.</p><p>Em\
    \ rela\xE7\xE3o ao cen\xE1rio dom\xE9stico, o conjunto dos indicadores mostra\
    \ acelera\xE7\xE3o da atividade econ\xF4mica no primeiro trimestre do ano, com\
    \ setores mais c\xEDclicos voltando a desempenhar papel significativo, e mercado\
    \ de trabalho ainda com sinais de resili\xEAncia. Nas divulga\xE7\xF5es mais recentes,\
    \ a infla\xE7\xE3o cheia e as medidas subjacentes aceleraram, distanciando-se\
    \ adicionalmente da meta para a infla\xE7\xE3o, superando seu limite superior\
    \ na \xFAltima leitura.</p><p>As expectativas de infla\xE7\xE3o para 2026 e 2027\
    \ apuradas pela pesquisa Focus permanecem em valores acima da meta, situando-se\
    \ em 5,30% e 4,10%, respectivamente. A proje\xE7\xE3o de infla\xE7\xE3o do Copom\
    \ para o quarto trimestre de 2027, atual horizonte relevante de pol\xEDtica monet\xE1\
    ria, situa-se em 3,7% no cen\xE1rio de refer\xEAncia (Tabela 1). &#160;</p><p>Os\
    \ riscos para a infla\xE7\xE3o, tanto de alta quanto de baixa, permanecem mais\
    \ elevados que o usual. Entre os riscos de alta para o cen\xE1rio inflacion\xE1\
    rio e as expectativas de infla\xE7\xE3o, destacam-se (i) uma desancoragem das\
    \ expectativas de infla\xE7\xE3o por per\xEDodo mais prolongado, com horizontes\
    \ mais longos incorporando impactos potenciais de segunda ordem de choques de\
    \ oferta, relacionados ao petr\xF3leo e seus derivados, e a efeitos clim\xE1ticos\
    \ sobre a produtividade agr\xEDcola e custos de energia; (ii) uma maior resili\xEA\
    ncia na infla\xE7\xE3o de servi\xE7os do que a projetada em fun\xE7\xE3o de um\
    \ hiato do produto mais positivo; (iii) uma conjun\xE7\xE3o de pol\xEDticas econ\xF4\
    micas externa e interna que tenham impacto inflacion\xE1rio maior que o esperado,\
    \ por exemplo, por meio de uma taxa de c\xE2mbio persistentemente mais depreciada;\
    \ e (iv) est\xEDmulos \xE0 demanda agregada, em particular ao componente de consumo,\
    \ que tenham como resultado o crescimento da atividade econ\xF4mica acima do produto\
    \ potencial, enfraquecendo parte dos canais usuais de transmiss\xE3o da pol\xED\
    tica monet\xE1ria. Entre os riscos de baixa, ressaltam-se (i) uma eventual desacelera\xE7\
    \xE3o da atividade econ\xF4mica dom\xE9stica mais acentuada do que a projetada,\
    \ tendo impactos sobre o cen\xE1rio de infla\xE7\xE3o; (ii) uma desacelera\xE7\
    \xE3o global mais pronunciada decorrente dos choques de com\xE9rcio e do petr\xF3\
    leo, e de um cen\xE1rio de maior incerteza; e (iii) uma redu\xE7\xE3o nos pre\xE7\
    os das <em>commodities</em> com efeitos desinflacion\xE1rios.</p><p>O Comit\xEA\
    \ segue acompanhando como os desenvolvimentos da pol\xEDtica fiscal dom\xE9stica\
    \ impactam a pol\xEDtica monet\xE1ria e os ativos financeiros, refor\xE7ando a\
    \ postura de cautela em cen\xE1rio de maior incerteza. Os indicadores correntes\
    \ de atividade econ\xF4mica mostram recupera\xE7\xE3o em rela\xE7\xE3o ao \xFA\
    ltimo trimestre de 2025, mantendo-se consistentes com uma trajet\xF3ria de desacelera\xE7\
    \xE3o no acumulado de 2026. O cen\xE1rio segue sendo marcado por expectativas\
    \ desancoradas, proje\xE7\xF5es de infla\xE7\xE3o elevadas, e press\xF5es no mercado\
    \ de trabalho.</p><p>Nesse momento, as proje\xE7\xF5es de infla\xE7\xE3o apresentam\
    \ distanciamento adicional em rela\xE7\xE3o \xE0 meta no horizonte relevante para\
    \ a pol\xEDtica monet\xE1ria. Ao mesmo tempo, a incerteza acerca dessas proje\xE7\
    \xF5es permanece mais elevada que o usual, em fun\xE7\xE3o da falta de clareza\
    \ sobre a trajet\xF3ria dos condicionantes dos modelos de proje\xE7\xE3o analisados.\
    \ </p><p>O per\xEDodo prolongado de manuten\xE7\xE3o da taxa b\xE1sica de juros\
    \ em patamar contracionista propiciou evid\xEAncias da transmiss\xE3o da pol\xED\
    tica monet\xE1ria sobre a desacelera\xE7\xE3o da atividade econ\xF4mica. Em decorr\xEA\
    ncia da din\xE2mica dos riscos associados \xE0 evolu\xE7\xE3o dos pre\xE7os, o\
    \ Comit\xEA reafirma que a magnitude total do ciclo de calibra\xE7\xE3o ser\xE1\
    \ estabelecida \xE0 luz de novas informa\xE7\xF5es visando assegurar a converg\xEA\
    ncia da infla\xE7\xE3o \xE0 meta. </p><p>Na avalia\xE7\xE3o do Comit\xEA, o grau\
    \ de restri\xE7\xE3o acumulado pela pol\xEDtica monet\xE1ria permite diferentes\
    \ trajet\xF3rias de taxas de juros compat\xEDveis com a converg\xEAncia da infla\xE7\
    \xE3o para a meta. Os modelos de proje\xE7\xE3o, utilizando essas trajet\xF3rias\
    \ da taxa b\xE1sica entre seus condicionantes, est\xE3o sujeitos a incertezas\
    \ acima das usuais na conjuntura atual. Essas incertezas se somam ao cen\xE1rio\
    \ de choques de oferta, o que fundamenta a gradua\xE7\xE3o, ao menos parcial,\
    \ de seus efeitos sobre a din\xE2mica futura de pre\xE7os. </p><p>Nas simula\xE7\
    \xF5es atuais, a trajet\xF3ria de pol\xEDtica monet\xE1ria necess\xE1ria para\
    \ assegurar a converg\xEAncia da infla\xE7\xE3o \xE0 meta, no atual horizonte\
    \ relevante, implicaria que as taxas de infla\xE7\xE3o projetadas a partir do\
    \ horizonte relevante vigente na pr\xF3xima reuni\xE3o estariam situadas abaixo\
    \ da meta. Nessas condi\xE7\xF5es, o Comit\xEA avalia que trajet\xF3rias alternativas\
    \ garantindo a converg\xEAncia da infla\xE7\xE3o \xE0 meta no primeiro trimestre\
    \ de 2028, o horizonte relevante a partir de sua pr\xF3xima decis\xE3o, s\xE3\
    o compat\xEDveis com a suaviza\xE7\xE3o na varia\xE7\xE3o dos agregados macroecon\xF4\
    micos. </p><p>O Comit\xEA julgou apropriado, nesse momento, dar sequ\xEAncia ao\
    \ ciclo de calibra\xE7\xE3o da pol\xEDtica monet\xE1ria, reduzindo a taxa b\xE1\
    sica de juros para 14,25% a.a. </p><p>No cen\xE1rio atual, caracterizado por forte\
    \ aumento da incerteza, o Comit\xEA reafirma serenidade e cautela na condu\xE7\
    \xE3o da pol\xEDtica monet\xE1ria. Sem preju\xEDzo de seu objetivo fundamental\
    \ de assegurar a estabilidade de pre\xE7os, essa decis\xE3o tamb\xE9m implica\
    \ suaviza\xE7\xE3o das flutua\xE7\xF5es do n\xEDvel de atividade econ\xF4mica\
    \ e fomento do pleno emprego. </p><p>Votaram por essa decis\xE3o os seguintes\
    \ membros do Comit\xEA&#58; Gabriel Muricca Gal\xEDpolo (presidente), Ailton de\
    \ Aquino Santos, Gilneu Francisco Astolfi Vivan, Izabela Moreira Correa, Nilton\
    \ Jos\xE9 Schneider David, Paulo Picchetti, e Rodrigo Alves Teixeira.</p><p>Tabela\
    \ 1</p><p>Proje\xE7\xF5es de infla\xE7\xE3o no cen\xE1rio de refer\xEAncia</p><p>Varia\xE7\
    \xE3o do IPCA acumulada em quatro trimestres (%)</p><table cellspacing=\"0\" class=\"\
    ms-rteTable-default\" width=\"100%\"><tbody><tr><td class=\"ms-rteTable-default\"\
    >\xCDndice de pre\xE7os</td><td class=\"ms-rteTable-default\">2026</td><td class=\"\
    ms-rteTable-default\">4\xBA tri 2027</td></tr><tr><td class=\"ms-rteTable-default\"\
    >IPCA</td><td class=\"ms-rteTable-default\">5,2</td><td class=\"ms-rteTable-default\"\
    >3,7</td></tr><tr><td class=\"ms-rteTable-default\">IPCA livres</td><td class=\"\
    ms-rteTable-default\">5,3</td><td class=\"ms-rteTable-default\">3,7</td></tr><tr><td\
    \ class=\"ms-rteTable-default\">IPCA administrados</td><td class=\"ms-rteTable-default\"\
    >4,7</td><td class=\"ms-rteTable-default\">3,9</td></tr></tbody></table><p>&#160;</p><p><sub>No\
    \ cen\xE1rio de refer\xEAncia, a trajet\xF3ria para a taxa de juros \xE9 extra\xED\
    da da pesquisa Focus e a taxa de c\xE2mbio parte de R$5,10/US$, evoluindo segundo\
    \ a paridade do poder de compra (PPC). O pre\xE7o do petr\xF3leo segue aproximadamente\
    \ a curva futura pelos pr\xF3ximos seis meses e passa a aumentar 2% ao ano posteriormente.\
    \ Al\xE9m disso, adota-se a hip\xF3tese de bandeira tarif\xE1ria \u201Camarela&quot;\
    \ em dezembro de 2026 e de 2027. O valor para o c\xE2mbio foi obtido pelo procedimento\
    \ usual.</sub></p><p><br /></p></div>"
