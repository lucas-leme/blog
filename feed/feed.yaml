    \ e criou as bases para a nossa economia at\xE9 os dias atuais. Como presidente\
    \ do Banco Central entre 1997 e 1999, no per\xEDodo da reelei\xE7\xE3o do presidente\
    \ Fernando Henrique Cardoso, Gustavo enfrentou algumas das maiores crises internacionais\
    \ da hist\xF3ria recente: crise da \xC1sia e a crise da R\xFAssia. Esteve no centro\
    \ de uma das decis\xF5es mais marcantes da pol\xEDtica monet\xE1ria brasileira,\
