  date: '2026-04-06T12:51:00+00:00'
  description: "The Federal Reserve\u2019s 2022-23 tightening cycle involved the use\
    \ of two monetary policy tools: changes in administrative rates and changes in\
    \ the size of its balance sheet. This post highlights the results of a recent\
    \ <a href=\"https://www.newyorkfed.org/research/staff_reports/sr1189\" rel=\"\
    noreferrer noopener\" target=\"_blank\">Staff Report</a>\_that explores how these\
    \ tools affect money market conditions. Using confidential trade-level data,\_\
    we find that both tools have significant effects on the pricing of funds sourced\
    \ through repo. These results suggest that the Fed can manage how financing conditions\
    \ are affected even as it influences economic conditions. For example, the Fed\
    \ can lower its administrative rates to loosen economic conditions, while shrinking\
    \ its balance sheet to\_maintain\_financing conditions in the money markets."
  image: https://d3g9pb5nvr3u7.cloudfront.net/sites/59dd2d9d016a1b2d929cd15b/-1445257209/256.jpg
  path: https://libertystreeteconomics.newyorkfed.org/2026/04/the-fed-has-two-tools-to-influence-money-market-conditions/
  title: "The Fed\_Has\_Two\_Tools to Influence Money Market Conditions"
- author: Flirting with Models
  categories:
