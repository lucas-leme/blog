  description: "<div class=\"ExternalClass6AE4B127BE584FC1A11072EBDFE12743\"><p>\u200B\
    O ambiente externo permanece incerto, em fun\xE7\xE3o da indefini\xE7\xE3o a respeito\
    \ da dura\xE7\xE3o, extens\xE3o, e desdobramentos dos conflitos geopol\xEDticos\
    \ no Oriente M\xE9dio, com reflexos nas condi\xE7\xF5es financeiras globais. Tal\
    \ cen\xE1rio exige cautela por parte de pa\xEDses emergentes em ambiente marcado\
    \ por eleva\xE7\xE3o da volatilidade de pre\xE7os de ativos e <em>commodities</em>.</p><p>Em\
    \ rela\xE7\xE3o ao cen\xE1rio dom\xE9stico, o conjunto dos indicadores segue apresentando,\
    \ conforme esperado, trajet\xF3ria de modera\xE7\xE3o no crescimento da atividade\
    \ econ\xF4mica, enquanto o mercado de trabalho ainda mostra sinais de resili\xEA\
    ncia. Nas divulga\xE7\xF5es mais recentes, a infla\xE7\xE3o cheia e as medidas\
    \ subjacentes aceleraram, distanciando-se adicionalmente da meta para a infla\xE7\
    \xE3o. </p><p>As expectativas de infla\xE7\xE3o para 2026 e 2027 apuradas pela\
    \ pesquisa Focus permanecem em valores acima da meta, situando-se em 4,9% e 4,0%,\
    \ respectivamente. A proje\xE7\xE3o de infla\xE7\xE3o do Copom para o quarto trimestre\
    \ de 2027, atual horizonte relevante de pol\xEDtica monet\xE1ria, situa-se em\
    \ 3,5% no cen\xE1rio de refer\xEAncia (Tabela 1).</p><p>Os riscos para a infla\xE7\
    \xE3o, tanto de alta quanto de baixa, permanecem mais elevados que o usual, perante\
    \ a indefini\xE7\xE3o acerca dos conflitos no Oriente M\xE9dio. Entre os riscos\
    \ de alta para o cen\xE1rio inflacion\xE1rio e as expectativas de infla\xE7\xE3\
    o, destacam-se (i) uma desancoragem das expectativas de infla\xE7\xE3o por per\xED\
    odo mais prolongado, com horizontes mais longos incorporando impactos potenciais\
    \ de segunda ordem de restri\xE7\xF5es de oferta de petr\xF3leo e seus derivados;\
    \ (ii) uma maior resili\xEAncia na infla\xE7\xE3o de servi\xE7os do que a projetada\
    \ em fun\xE7\xE3o de um hiato do produto mais positivo; e (iii) uma conjun\xE7\
    \xE3o de pol\xEDticas econ\xF4micas externa e interna que tenham impacto inflacion\xE1\
    rio maior que o esperado, por exemplo, por meio de uma taxa de c\xE2mbio persistentemente\
    \ mais depreciada. Entre os riscos de baixa, ressaltam-se (i) uma eventual desacelera\xE7\
    \xE3o da atividade econ\xF4mica dom\xE9stica mais acentuada do que a projetada,\
    \ tendo impactos sobre o cen\xE1rio de infla\xE7\xE3o; (ii) uma desacelera\xE7\
    \xE3o global mais pronunciada decorrente dos choques de com\xE9rcio e do petr\xF3\
    leo, e de um cen\xE1rio de maior incerteza; e (iii) uma redu\xE7\xE3o nos pre\xE7\
    os das <em>commodities</em> com efeitos desinflacion\xE1rios.</p><p>O Comit\xEA\
    \ segue acompanhando como os desenvolvimentos da pol\xEDtica fiscal dom\xE9stica\
    \ impactam a pol\xEDtica monet\xE1ria e os ativos financeiros, refor\xE7ando a\
    \ postura de cautela em cen\xE1rio de maior incerteza. Os indicadores correntes\
    \ de atividade econ\xF4mica mostram recupera\xE7\xE3o em rela\xE7\xE3o ao \xFA\
    ltimo trimestre de 2025, mantendo-se consistentes com uma trajet\xF3ria de desacelera\xE7\
    \xE3o no acumulado de 2026, enquanto o cen\xE1rio segue sendo marcado por expectativas\
    \ desancoradas, proje\xE7\xF5es de infla\xE7\xE3o elevadas, e press\xF5es no mercado\
    \ de trabalho. </p><p>O Comit\xEA considera os impactos dos conflitos no Oriente\
    \ M\xE9dio de forma prospectiva, em particular seus efeitos sobre a cadeia de\
    \ suprimentos global e os pre\xE7os de <em>commodities</em> que afetam direta\
    \ e indiretamente a infla\xE7\xE3o no Brasil. Nesse momento, as proje\xE7\xF5\
    es de infla\xE7\xE3o apresentam distanciamento adicional em rela\xE7\xE3o \xE0\
    \ meta no horizonte relevante para a pol\xEDtica monet\xE1ria. Ao mesmo tempo,\
    \ a incerteza acerca dessas proje\xE7\xF5es foi elevada consideravelmente, em\
    \ fun\xE7\xE3o da falta de clareza sobre a dura\xE7\xE3o dos conflitos e de seus\
    \ efeitos sobre os condicionantes dos modelos de proje\xE7\xE3o analisados. O\
    \ Comit\xEA julgou apropriado dar sequ\xEAncia ao ciclo de calibra\xE7\xE3o da\
    \ pol\xEDtica monet\xE1ria, na medida em que o per\xEDodo prolongado de manuten\xE7\
    \xE3o da taxa b\xE1sica de juros em patamar contracionista propiciou evid\xEA\
    ncias da transmiss\xE3o da pol\xEDtica monet\xE1ria sobre a desacelera\xE7\xE3\
    o da atividade econ\xF4mica, criando condi\xE7\xF5es para que ajustes no ritmo\
    \ e extens\xE3o dessa calibra\xE7\xE3o, \xE0 luz de novas informa\xE7\xF5es, sejam\
    \ poss\xEDveis de forma a assegurar o n\xEDvel compat\xEDvel com a converg\xEA\
    ncia da infla\xE7\xE3o \xE0 meta. </p><p>O Copom decidiu reduzir a taxa b\xE1\
    sica de juros para 14,50% a.a., e entende que essa decis\xE3o \xE9 compat\xED\
    vel com a estrat\xE9gia de converg\xEAncia da infla\xE7\xE3o para o redor da meta\
    \ ao longo do horizonte relevante. Sem preju\xEDzo de seu objetivo fundamental\
    \ de assegurar a estabilidade de pre\xE7os, essa decis\xE3o tamb\xE9m implica\
    \ suaviza\xE7\xE3o das flutua\xE7\xF5es do n\xEDvel de atividade econ\xF4mica\
    \ e fomento do pleno emprego.</p><p>No cen\xE1rio atual, caracterizado por forte\
    \ aumento da incerteza, o Comit\xEA reafirma serenidade e cautela na condu\xE7\
    \xE3o da pol\xEDtica monet\xE1ria, de forma que os passos futuros do processo\
    \ de calibra\xE7\xE3o da taxa b\xE1sica de juros possam incorporar novas informa\xE7\
    \xF5es que aumentem a clareza sobre a profundidade e a extens\xE3o dos conflitos\
    \ no Oriente M\xE9dio, assim como seus efeitos diretos e indiretos sobre o n\xED\
    vel de pre\xE7os ao longo do tempo. </p><p>Votaram por essa decis\xE3o os seguintes\
    \ membros do Comit\xEA&#58; Gabriel Muricca Gal\xEDpolo (presidente), Ailton de\
    \ Aquino Santos, Gilneu Francisco Astolfi Vivan, Izabela Moreira Correa, Nilton\
    \ Jos\xE9 Schneider David e Paulo Picchetti.</p><p><strong>Tabela 1</strong></p><p><strong>Proje\xE7\
    \xF5es de infla\xE7\xE3o no cen\xE1rio de refer\xEAncia</strong></p><p><strong>Varia\xE7\
    \xE3o do IPCA acumulada em quatro trimestres (%)</strong></p><table cellspacing=\"\
    0\" class=\"ms-rteTable-default\" width=\"100%\"><tbody><tr><td class=\"ms-rteTable-default\"\
    >\xCDndice de pre\xE7os</td><td class=\"ms-rteTable-default\">2026</td><td class=\"\
    ms-rteTable-default\">4\xBA tri 2027</td></tr><tr><td class=\"ms-rteTable-default\"\
    >IPCA</td><td class=\"ms-rteTable-default\">4,6</td><td class=\"ms-rteTable-default\"\
    >3,5</td></tr><tr><td class=\"ms-rteTable-default\">IPCA livres</td><td class=\"\
    ms-rteTable-default\">4,5</td><td class=\"ms-rteTable-default\">3,5</td></tr><tr><td\
    \ class=\"ms-rteTable-default\">IPCA administrados</td><td class=\"ms-rteTable-default\"\
    >4,8</td><td class=\"ms-rteTable-default\">3,6</td></tr></tbody></table><p><strong>&#160;</strong></p><p><sub>No\
    \ cen\xE1rio de refer\xEAncia, a trajet\xF3ria para a taxa de juros \xE9 extra\xED\
    da da pesquisa Focus e a taxa de c\xE2mbio parte de R$5,00/US$, evoluindo segundo\
    \ a paridade do poder de compra (PPC). O pre\xE7o do petr\xF3leo segue aproximadamente\
    \ a curva futura pelos pr\xF3ximos seis meses e passa a aumentar 2% ao ano posteriormente.\
    \ Al\xE9m disso, adota-se a hip\xF3tese de bandeira tarif\xE1ria \u201Camarela&quot;\
    \ em dezembro de 2026 e de 2027. O valor para o c\xE2mbio foi obtido pelo procedimento\
    \ usual.</sub></p><p><br /></p></div>"
