  description: "A elei\xE7\xE3o de 2026 parece simples \xE0 primeira vista: um pa\xED\
    s dividido, dois polos fortes e um cen\xE1rio j\xE1 conhecido. Mas segundo Felipe\
    \ Nunes, a realidade \xE9 muito mais complexa \u2014 e perigosa para quem est\xE1\
    \ interpretando errado. Neste epis\xF3dio do Market Makers, voc\xEA vai entender\
    \ por que a elei\xE7\xE3o \u201Ccome\xE7a empatada\u201D, quem realmente decide\
    \ o jogo e quais sinais o mercado ainda n\xE3o est\xE1 enxergando.Ao longo da\
    \ conversa, mergulhamos no comportamento do eleitor brasileiro, na evolu\xE7\xE3\
    o da polariza\xE7\xE3o e nas mudan\xE7as silenciosas que est\xE3o acontecendo\
    \ no pa\xEDs. O Brasil ficou mais \xE0 direita? O crescimento dos evang\xE9licos\
    \ muda o jogo? Por que os dados econ\xF4micos n\xE3o batem com a sensa\xE7\xE3\
    o das pessoas? E principalmente: por que tanta gente est\xE1 errando ao analisar\
    \ pesquisas eleitorais \u2014 inclusive profissionais do mercado?Mais do que pol\xED\
    tica, esse epis\xF3dio \xE9 sobre entender o Brasil real. Um pa\xEDs que n\xE3\
    o \xE9 mais o da Faria Lima nem o da bolha das redes sociais. Um pa\xEDs onde\
    \ 30% dos eleitores s\xE3o independentes, onde a percep\xE7\xE3o importa mais\
    \ que os dados e onde o Senado pode ter mais impacto do que a pr\xF3pria elei\xE7\
    \xE3o presidencial. Se voc\xEA investe, empreende ou simplesmente quer entender\
    \ para onde o Brasil est\xE1 indo, esse epis\xF3dio \xE9 obrigat\xF3rio.Neste\
    \ epis\xF3dio, voc\xEA vai aprender:-Por que a elei\xE7\xE3o de 2026 come\xE7\
    a \u201Cempatada\u201D-Quem s\xE3o os 30% que realmente decidem o resultado-Como\
    \ funcionam as pesquisas eleitorais (de verdade)-O erro mais comum ao interpretar\
    \ dados pol\xEDticos-O impacto dos evang\xE9licos e da nova cultura brasileira-Por\
    \ que o Brasil est\xE1 mais conservador \u2014 e o que isso significa-A diferen\xE7\
    a entre o Brasil real e o Brasil da bolha-O papel decisivo do Senado e do Congresso\
