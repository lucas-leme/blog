  description: "Economists often look at nominal wage growth to gauge labor market\
    \ imbalances, price pressures, and households\u2019 spending ability. But to use\
    \ wage growth for these purposes, it is important to look through short-run fluctuations\
    \ and retrieve underlying wage inflation. In this post, we use our own measure\
    \ of wage growth persistence\u2014called Trend Wage Inflation (TWIn in short)\u2014\
    to summarize what we learned from wage growth behavior in the past years and draw\
    \ conclusions for what may lie ahead. Since peaking in late 2021, TWIn has been\
    \ on a steady decline, reaching levels near those of the 2017-19 period. In the\
    \ past few months, however, this decline seems to have lost momentum. Our analysis\
    \ shows that most of the decline in TWIn between 2022 and 2025 was common across\
    \ industries. Recently, however, a few sectors have shown a decoupling of wage\
    \ growth dynamics.<br />"
