  description: "Do the recent stresses in the NBFI space\u2014notably the bankruptcies\
    \ of Tricolor and First Brands, and the decision of Blue Owl Capital Corp II (OBDC\
    \ II) to end its redemption program and return capital through a wind-down of\
    \ the fund\u2014create distress for banks? The general sentiment is that the recent\
    \ stresses are unlikely to amount to systemic concerns, although it does not mean\
    \ there might not be \u201C<a href=\"https://finance.yahoo.com/markets/currencies/article/jpmorgan-ceo-jamie-dimon-downplays-private-credit-concerns-not-particularly-worried-143401075.html\"\
    >some stress and strain</a>\u201D for banks and that policymakers are \u201C<a\
    \ href=\"https://www.bloomberg.com/news/articles/2026-04-02/fed-s-williams-sees-risks-to-inflation-employment-in-balance\"\
    >watching carefully</a>\u201D for exposure across banks.\_In a series of previous\
    \ posts, we showed that shocks to nonbank financial institutions (NBFIs) directly\
    \ impact banks that have exposures to NBFIs. In this post, we show that bank stocks\
    \ have been directly impacted by NBFIs yet again.\_In short, NBFI troubles do\
    \ result in \u201Cstress and strain\u201D for banks."
