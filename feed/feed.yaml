  description: "<div id=\"atacompleta\"><div id=\"ataconteudo\"><h3 class=\"secao\"\
    >A) Atualiza\xE7\xE3o da conjuntura econ\xF4mica e do cen\xE1rio do Copom<sup>1</sup></h3><p\
    \ class=\"paragrafo\">1. O ambiente externo permanece incerto em fun\xE7\xE3o\
    \ da indefini\xE7\xE3o sobre os termos do acordo para cessar os conflitos armados\
    \ no Oriente M\xE9dio e as consequ\xEAncias dos efeitos j\xE1 materializados desses\
    \ conflitos at\xE9 o momento, com reflexos nas condi\xE7\xF5es financeiras globais.\
    \ Tal cen\xE1rio exige cautela por parte de pa\xEDses emergentes em ambiente marcado\
    \ por eleva\xE7\xE3o da volatilidade de pre\xE7os de ativos e <i>commodities</i>.</p><p\
    \ class=\"paragrafo\">2. Em rela\xE7\xE3o ao cen\xE1rio dom\xE9stico, o conjunto\
    \ dos indicadores mostra acelera\xE7\xE3o da atividade econ\xF4mica no primeiro\
    \ trimestre do ano, com setores mais c\xEDclicos voltando a desempenhar papel\
    \ significativo, e mercado de trabalho ainda com sinais de resili\xEAncia. Nas\
    \ divulga\xE7\xF5es mais recentes, a infla\xE7\xE3o cheia e as medidas subjacentes\
    \ aceleraram, distanciando-se adicionalmente da meta para a infla\xE7\xE3o, superando\
    \ seu limite superior na \xFAltima leitura.</p><p class=\"paragrafo\">3. As expectativas\
    \ de infla\xE7\xE3o para 2026 e 2027 apuradas pela pesquisa Focus permanecem em\
    \ valores acima da meta, situando-se em 5,30% e 4,10%, respectivamente. A proje\xE7\
    \xE3o de infla\xE7\xE3o do Copom para o quarto trimestre de 2027, atual horizonte\
    \ relevante de pol\xEDtica monet\xE1ria, situa-se em 3,7% no cen\xE1rio de refer\xEA\
    ncia (Tabela 1).</p><h3 class=\"secao\">B) Cen\xE1rios e an\xE1lise de riscos</h3><p\
    \ class=\"paragrafo\">4. A incerteza com rela\xE7\xE3o ao cen\xE1rio externo seguiu\
    \ em n\xEDveis elevados. Al\xE9m das indefini\xE7\xF5es em rela\xE7\xE3o aos desdobramentos\
    \ das tens\xF5es geopol\xEDticas, colaborou para esse cen\xE1rio a perman\xEA\
    ncia de incertezas com rela\xE7\xE3o \xE0 pol\xEDtica econ\xF4mica dos Estados\
    \ Unidos.</p><p class=\"paragrafo\">5. A atividade econ\xF4mica dom\xE9stica manteve\
    \ trajet\xF3ria de modera\xE7\xE3o no crescimento, tal como antecipado pelo Comit\xEA\
    . O Comit\xEA relembra que o arrefecimento da demanda agregada \xE9 um elemento\
    \ essencial do processo de reequil\xEDbrio entre oferta e demanda da economia\
    \ e converg\xEAncia da infla\xE7\xE3o \xE0 meta. Os efeitos da pol\xEDtica monet\xE1\
    ria restritiva por per\xEDodo prolongado sobre a demanda agregada ainda se fazem\
    \ sentir por meio da desacelera\xE7\xE3o do saldo de cr\xE9dito, em particular\
    \ de cr\xE9ditos livres.</p><p class=\"paragrafo\">6. A modera\xE7\xE3o e a pr\xF3\
    pria heterogeneidade das trajet\xF3rias de crescimento entre diferentes setores\
    \ e mercados s\xE3o compat\xEDveis com a pol\xEDtica monet\xE1ria em curso. Mercados\
    \ mais sens\xEDveis \xE0s condi\xE7\xF5es financeiras apresentam maior desacelera\xE7\
    \xE3o, ao passo que mercados mais sens\xEDveis \xE0 renda apresentam maior resili\xEA\
    ncia. Naturalmente, em momentos de inflex\xE3o no ciclo econ\xF4mico, observam-se\
    \ sinais mistos advindos de indicadores econ\xF4micos. No primeiro trimestre de\
    \ 2026, houve uma retomada da atividade econ\xF4mica em rela\xE7\xE3o ao final\
    \ de 2025. Este movimento \xE9 consistente com proje\xE7\xF5es e expectativas\
    \ de uma varia\xE7\xE3o positiva do PIB em 2026, ainda que menor que em 2025.</p><p\
    \ class=\"paragrafo\">7. O Comit\xEA segue acompanhando detidamente o mercado\
    \ de trabalho. A taxa de desemprego tem, recorrentemente, se mantido em patamares\
    \ historicamente baixos enquanto os rendimentos reais m\xE9dios t\xEAm mantido\
    \ a tend\xEAncia de eleva\xE7\xE3o acima do crescimento da produtividade do trabalho.\
    \ O Comit\xEA segue atento ao debate sobre as dimens\xF5es corrente e estrutural\
    \ do mercado de trabalho, enfatizando a necessidade do aprofundamento dessa an\xE1\
    lise para a avalia\xE7\xE3o dos padr\xF5es de transmiss\xE3o dos n\xEDveis de\
    \ ocupa\xE7\xE3o para os rendimentos do trabalho e, finalmente, para os pre\xE7\
    os dos diversos setores da economia.</p><p class=\"paragrafo\">8. A pol\xEDtica\
    \ fiscal tem um impacto de curto prazo, majoritariamente por meio de est\xEDmulo\
    \ \xE0 demanda agregada, e uma dimens\xE3o mais estrutural, que tem potencial\
    \ de afetar a percep\xE7\xE3o sobre a sustentabilidade da d\xEDvida e impactar\
    \ o pr\xEAmio a termo da curva de juros. Uma pol\xEDtica fiscal que atue de forma\
    \ contrac\xEDclica e contribua para a redu\xE7\xE3o do pr\xEAmio de risco favorece\
    \ a converg\xEAncia da infla\xE7\xE3o \xE0 meta. O Comit\xEA reafirma a vis\xE3\
    o de que o esmorecimento no esfor\xE7o de reformas estruturais e disciplina fiscal,\
    \ o aumento de cr\xE9dito direcionado e as incertezas sobre a estabiliza\xE7\xE3\
    o da d\xEDvida p\xFAblica t\xEAm o potencial de elevar a taxa de juros neutra\
    \ da economia, com impactos delet\xE9rios sobre a pot\xEAncia da pol\xEDtica monet\xE1\
    ria e, consequentemente, sobre o custo de desinfla\xE7\xE3o em termos de atividade.\
    \ O Comit\xEA mant\xE9m a firme convic\xE7\xE3o de que as pol\xEDticas devem ser\
    \ previs\xEDveis, cr\xEDveis e antic\xEDclicas. Em particular, o debate do Comit\xEA\
    \ refor\xE7a, novamente, a necessidade de pol\xEDticas fiscal e monet\xE1ria harmoniosas.</p><p\
    \ class=\"paragrafo\">9. As expectativas de infla\xE7\xE3o, medidas por diferentes\
    \ instrumentos e obtidas de diferentes grupos de agentes permanecem acima da meta\
    \ de infla\xE7\xE3o em todos os horizontes. Desde a reuni\xE3o anterior ficou\
    \ evidente uma desancoragem adicional das expectativas de infla\xE7\xE3o para\
    \ horizontes mais longos, em particular para o ano de 2028. Foi ressaltado que\
    \ o custo de desinfla\xE7\xE3o sobre o n\xEDvel de atividade ao longo do tempo\
    \ \xE9 maior em ambientes com expectativas desancoradas. O Comit\xEA avalia que\
    \ perseveran\xE7a, firmeza e serenidade na condu\xE7\xE3o da pol\xEDtica monet\xE1\
    ria favorecer\xE3o a continuidade desse movimento, importante para a converg\xEA\
    ncia da infla\xE7\xE3o \xE0 meta com menor custo. A principal conclus\xE3o obtida,\
    \ e compartilhada por todos os membros do Comit\xEA, foi a de que, em um ambiente\
    \ de expectativas desancoradas, como \xE9 o caso do atual, exige-se uma restri\xE7\
    \xE3o monet\xE1ria maior e por mais tempo do que outrora seria apropriado.</p><p\
    \ class=\"paragrafo\">10. As leituras recentes at\xE9 o in\xEDcio dos conflitos\
    \ indicavam algum arrefecimento da infla\xE7\xE3o que abrangia tanto o \xEDndice\
    \ cheio quanto em aberturas e medidas subjacentes. A combina\xE7\xE3o de um c\xE2\
    mbio mais apreciado e um comportamento mais benigno das <i>commodities</i> nos\
    \ per\xEDodos recentes contribu\xEDa para redu\xE7\xE3o nas infla\xE7\xF5es de\
    \ bens industrializados e alimentos. A infla\xE7\xE3o de servi\xE7os tamb\xE9\
    m apresentava algum arrefecimento, ainda que mais resiliente, respondendo a um\
    \ mercado de trabalho que segue din\xE2mico e a uma atividade que tem apresentado\
    \ modera\xE7\xE3o gradual. As \xFAltimas divulga\xE7\xF5es de infla\xE7\xE3o,\
    \ tanto ao consumidor, quanto ao produtor, mostraram sinais claros de efeitos\
    \ dos conflitos geopol\xEDticos no Oriente M\xE9dio, situando-se em valores significativamente\
    \ acima dos inicialmente esperados. Para al\xE9m dos efeitos dos conflitos, mant\xE9\
    m-se, de um lado, a interpreta\xE7\xE3o de uma infla\xE7\xE3o pressionada pela\
    \ demanda e que requer uma pol\xEDtica monet\xE1ria contracionista e, de outro,\
    \ a interpreta\xE7\xE3o de que a pol\xEDtica monet\xE1ria tem contribu\xEDdo de\
    \ forma determinante para a desinfla\xE7\xE3o observada.</p><p class=\"paragrafo\"\
    >11. O Comit\xEA se debru\xE7ou ent\xE3o sobre as proje\xE7\xF5es. No cen\xE1\
    rio de refer\xEAncia, a trajet\xF3ria para a taxa de juros \xE9 extra\xEDda da\
    \ pesquisa Focus e a taxa de c\xE2mbio parte de R$5,10/US$<sup>2</sup>, evoluindo\
    \ segundo a paridade do poder de compra (PPC). O pre\xE7o do petr\xF3leo segue\
    \ aproximadamente a curva futura pelos pr\xF3ximos seis meses e passa a aumentar\
    \ 2% ao ano posteriormente, conforme governan\xE7a usual. Dada a curva de futuros\
    \ do Brent observada, essa governan\xE7a se traduziu em trajet\xF3ria decrescente\
    \ ao longo da segunda metade do ano, ap\xF3s forte alta no curto prazo. Al\xE9\
    m disso, adota-se a hip\xF3tese de bandeira tarif\xE1ria \u201Camarela\u201D para\
    \ tarifas de energia el\xE9trica em dezembro de 2026. O Comit\xEA continuar\xE1\
    \ acompanhando os dados para calibrar e refinar os impactos da medida de amplia\xE7\
    \xE3o da isen\xE7\xE3o do imposto de renda.</p><p class=\"paragrafo\">12. No cen\xE1\
    rio de refer\xEAncia, as proje\xE7\xF5es para a infla\xE7\xE3o acumulada em quatro\
    \ trimestres para 2026 e para o quarto trimestre de 2027, atual horizonte relevante\
    \ de pol\xEDtica monet\xE1ria, s\xE3o, respectivamente, 5,2% e 3,7%.</p><p class=\"\
    paragrafo\">13. Com rela\xE7\xE3o ao balan\xE7o de riscos, o Comit\xEA avaliou\
    \ que os riscos para a infla\xE7\xE3o, tanto de alta quanto de baixa, permanecem\
    \ mais elevados que o usual, com assimetria altista. Entre os riscos de alta para\
    \ o cen\xE1rio inflacion\xE1rio e as expectativas de infla\xE7\xE3o, destacam-se\
    \ (i) uma desancoragem das expectativas de infla\xE7\xE3o por per\xEDodo mais\
    \ prolongado, com horizontes mais longos incorporando impactos potenciais de segunda\
    \ ordem de choques de oferta, relacionados ao petr\xF3leo e seus derivados, e\
    \ a efeitos clim\xE1ticos sobre a produtividade agr\xEDcola e custos de energia;\
    \ (ii) uma maior resili\xEAncia na infla\xE7\xE3o de servi\xE7os do que a projetada\
    \ em fun\xE7\xE3o de um hiato do produto mais positivo; (iii) uma conjun\xE7\xE3\
    o de pol\xEDticas econ\xF4micas externa e interna que tenham impacto inflacion\xE1\
    rio maior que o esperado, por exemplo, por meio de uma taxa de c\xE2mbio persistentemente\
    \ mais depreciada; e (iv) est\xEDmulos \xE0 demanda agregada, em particular ao\
    \ componente de consumo, que tenham como resultado o crescimento da atividade\
    \ econ\xF4mica acima do produto potencial, enfraquecendo parte dos canais usuais\
    \ de transmiss\xE3o da pol\xEDtica monet\xE1ria. Entre os riscos de baixa, ressaltam-se\
    \ (i) uma eventual desacelera\xE7\xE3o da atividade econ\xF4mica dom\xE9stica\
    \ mais acentuada do que a projetada, tendo impactos sobre o cen\xE1rio de infla\xE7\
    \xE3o; (ii) uma desacelera\xE7\xE3o global mais pronunciada decorrente dos choques\
    \ de com\xE9rcio e do petr\xF3leo, e de um cen\xE1rio de maior incerteza; e (iii)\
    \ uma redu\xE7\xE3o nos pre\xE7os das <i>commodities</i> com efeitos desinflacion\xE1\
    rios.</p><h3 class=\"secao\">C) Discuss\xE3o sobre a condu\xE7\xE3o da pol\xED\
    tica monet\xE1ria</h3><p class=\"paragrafo\">14. O Copom passou ent\xE3o \xE0\
    \ discuss\xE3o da condu\xE7\xE3o da pol\xEDtica monet\xE1ria, considerando o conjunto\
    \ de proje\xE7\xF5es analisado, assim como o balan\xE7o de riscos para a infla\xE7\
    \xE3o prospectiva.</p><p class=\"paragrafo\">15. O Comit\xEA ponderou que o per\xED\
    odo prolongado de manuten\xE7\xE3o da taxa b\xE1sica de juros em patamar contracionista\
    \ propiciou evid\xEAncias da transmiss\xE3o da pol\xEDtica monet\xE1ria sobre\
    \ a desacelera\xE7\xE3o da atividade econ\xF4mica.</p><p class=\"paragrafo\">16.\
    \ Reafirmando seu compromisso de converg\xEAncia da infla\xE7\xE3o \xE0 meta no\
    \ horizonte relevante, o Copom passou ent\xE3o a considerar diferentes trajet\xF3\
    rias para a taxa b\xE1sica de juros. Em um primeiro momento, foi ressaltado que\
    \ o cen\xE1rio havia se deteriorado desde a \xFAltima decis\xE3o, tanto em termos\
    \ das leituras mais recentes da infla\xE7\xE3o cheia e suas medidas subjacentes,\
    \ quanto das expectativas para os anos de 2026, 2027 e 2028. Destacou-se que a\
    \ \xFAltima leitura do IPCA j\xE1 situa o \xEDndice acima do limite superior estabelecido\
    \ para a meta.</p><p class=\"paragrafo\">17. No cen\xE1rio de refer\xEAncia, partindo\
    \ da governan\xE7a usual de incorpora\xE7\xE3o da trajet\xF3ria da Selic representada\
    \ pela mediana das expectativas da Focus, a proje\xE7\xE3o do Copom para o quarto\
    \ trimestre de 2027, atual horizonte relevante, foi de 3,7%, evidenciando um distanciamento\
    \ maior da meta relativamente \xE0 proje\xE7\xE3o da reuni\xE3o anterior (3,5%).</p><p\
    \ class=\"paragrafo\">18. O Comit\xEA debateu trajet\xF3rias alternativas, n\xE3\
    o presentes em quaisquer das expectativas e respostas, da Focus ou QPC (Question\xE1\
    rio Pr\xE9-Copom), tampouco refletidas na precifica\xE7\xE3o da pol\xEDtica monet\xE1\
    ria pelos agentes de mercado, com converg\xEAncia da infla\xE7\xE3o \xE0 meta\
    \ no atual horizonte relevante, exigindo varia\xE7\xF5es abruptas de dire\xE7\xE3\
    o e de grande magnitude na Selic, seguida de diversos trimestres com infla\xE7\
    \xE3o abaixo da meta.</p><p class=\"paragrafo\">19. O Comit\xEA julgou como mais\
    \ adequadas, nesse momento, trajet\xF3rias de Selic menos discrepantes \xE0s presentes\
    \ na Focus, QPC e precifica\xE7\xE3o da pol\xEDtica monet\xE1ria, por evitarem\
    \ induzir volatilidade excessiva nos pre\xE7os dos ativos financeiros e agregados\
    \ macroecon\xF4micos, com efeitos potencialmente contraproducentes \xE0 pr\xF3\
    pria converg\xEAncia da infla\xE7\xE3o \xE0 meta.</p><p class=\"paragrafo\">20.\
    \ Essas trajet\xF3rias contemplavam cen\xE1rios com combina\xE7\xF5es de diferentes\
    \ momentos de pausa e retomada do ciclo de calibra\xE7\xE3o. Nesse caso, as flutua\xE7\
    \xF5es de produto se mostraram menores, com a infla\xE7\xE3o convergindo para\
    \ a meta no primeiro trimestre de 2028.</p><p class=\"paragrafo\">21. O Comit\xEA\
    \ debateu que esse conjunto de resultados deve ser ponderado \xE0 luz das melhores\
    \ pr\xE1ticas de pol\xEDtica monet\xE1ria, recomendando n\xE3o reagir integralmente\
    \ a varia\xE7\xF5es de pre\xE7os decorrentes de choques de oferta, que no momento\
    \ atual incluem incertezas relevantes. Tais incertezas envolvem n\xE3o s\xF3 a\
    \ extens\xE3o dos efeitos de choques j\xE1 materializados, como por exemplo das\
    \ consequ\xEAncias do conflito armado no Oriente M\xE9dio, quanto da extens\xE3\
    o de outros considerados na proje\xE7\xE3o, mas ainda n\xE3o materializados, como\
    \ por exemplo os impactos do <i>El Ni\xF1o</i>.</p><p class=\"paragrafo\">22.\
    \ No contexto atual de incerteza em n\xEDveis historicamente elevados, com riscos\
    \ assim\xE9tricos na dire\xE7\xE3o altista para os pre\xE7os, o Comit\xEA reitera\
    \ que a magnitude do ciclo de calibra\xE7\xE3o ser\xE1 ajustada \xE0 luz da evolu\xE7\
    \xE3o do cen\xE1rio, de forma a assegurar a converg\xEAncia da infla\xE7\xE3o\
    \ \xE0 meta.</p><h3 class=\"secao\">D) Decis\xE3o de pol\xEDtica monet\xE1ria</h3><p\
    \ class=\"paragrafo\">23. O Copom decidiu reduzir a taxa b\xE1sica de juros para\
    \ 14,25% a.a., e entende que essa decis\xE3o \xE9 compat\xEDvel com a estrat\xE9\
    gia de converg\xEAncia da infla\xE7\xE3o para o redor da meta, considerando as\
    \ observa\xE7\xF5es do par\xE1grafo 21 acima. Sem preju\xEDzo de seu objetivo\
    \ fundamental de assegurar a estabilidade de pre\xE7os, essa decis\xE3o tamb\xE9\
    m implica suaviza\xE7\xE3o das flutua\xE7\xF5es do n\xEDvel de atividade econ\xF4\
    mica e fomento do pleno emprego.</p><p class=\"paragrafo\">24. No cen\xE1rio atual,\
    \ caracterizado por forte aumento da incerteza, o Comit\xEA reafirma serenidade\
    \ e cautela na condu\xE7\xE3o da pol\xEDtica monet\xE1ria, de forma que os passos\
    \ futuros do processo de calibra\xE7\xE3o da taxa b\xE1sica de juros possam incorporar\
    \ novas informa\xE7\xF5es que aumentem a clareza sobre a profundidade e a extens\xE3\
    o dos conflitos no Oriente M\xE9dio, assim como seus efeitos diretos e indiretos\
    \ sobre o n\xEDvel de pre\xE7os ao longo do tempo.</p><p class=\"paragrafo\">25.\
    \ Votaram por essa decis\xE3o os seguintes membros do Comit\xEA: Gabriel Muricca\
    \ Gal\xEDpolo (presidente), Ailton de Aquino Santos, Gilneu Francisco Astolfi\
    \ Vivan, Izabela Moreira Correa, Nilton Jos\xE9 Schneider David, Paulo Picchetti,\
    \ e Rodrigo Alves Teixeira.</p><p class=\"paragrafo\"><b>Tabela 1</b></p><p class=\"\
