  description: "Quem realmente ganha dinheiro com o Mercado Livre, Amazon e Shopee\
    \ no Brasil?Enquanto todo mundo discute qual app de entrega vai dominar o e-commerce\
    \ brasileiro, uma ind\xFAstria silenciosa triplicou de tamanho em 5 anos, derrubou\
    \ a vac\xE2ncia de 25% para 8% e est\xE1 atraindo bilh\xF5es de reais de fundos\
    \ globais. Estamos falando do mercado de galp\xF5es log\xEDsticos \u2014 e dos\
    \ Fundos Imobili\xE1rios que permitem qualquer pessoa investir nele.Neste epis\xF3\
    dio, Thiago Salom\xE3o recebe Fernando Crestana, Associate Partner do BTG Pactual,\
    \ l\xEDder em gest\xE3o de FIIs no Brasil com R$ 85 bilh\xF5es sob administra\xE7\
    \xE3o. A conversa cobre a hist\xF3ria completa da ind\xFAstria \u2014 das tr\xEA\
    s fases dos FIIs brasileiros \xE0 institucionaliza\xE7\xE3o com REITs globais\
    \ \u2014, passando pela revolu\xE7\xE3o log\xEDstica p\xF3s-pandemia, como se\
    \ constr\xF3i e financia um galp\xE3o de ponta, a din\xE2mica de compra e venda\
    \ de ativos, e as oportunidades abertas em hotelaria e fundos corporativos num\
