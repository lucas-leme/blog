  description: 'The labor share of income in the U.S. is currently at its lowest-ever
    level in the post-war period. The labor share measures the fraction of economic
    output paid to workers as wages and salaries. As such, it is a useful benchmark
    for wage growth: when the labor share falls, it means that productivity, prices,
    or both are growing faster than wages. After much-studied drops in the 2000s,
    the labor share fell sharply again after the COVID pandemic. In this post, we
    compare the dynamics of the labor share post-COVID to earlier periods to understand
    whether the recent decline represents the continuation of a trend or a new and
    distinct phenomenon. We find that both the cyclicality of the labor share and
    the contribution of reallocation to the labor share post-COVID are similar to
    earlier periods.'
