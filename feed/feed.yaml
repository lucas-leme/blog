    \ para entender a mudan\xE7a no cen\xE1rio global em 2026. Em vez de cair, as\
    \ taxas de juros devem subir ainda mais.A alta de juros tem efeitos diferentes\
    \ ao redor do mundo. Nos Estados Unidos, n\xE3o foi capaz de frear o crescimento\
    \ das empresas de intelig\xEAncia artificial, que impulsionam com ela setores\
    \ como infraestrutura.\u201CMesmo com o choque das guerras, de novo a gente est\xE1\
    \ vendo a economia americana surpreender\u201D, afirma Andre Raduan, gestor macro\
    \ da Genoa. \u201CTemos crescimento robusto, apesar de todos os choques, e uma\
    \ infla\xE7\xE3o mais pressionada. A\xED n\xE3o tem como falar de corte de juros\
    \ mesmo, o juro de equil\xEDbrio tem que ser mais alto\".Jose Luiz Torres, gestor\
    \ de a\xE7\xF5es da Genoa, os juros altos diminuem o apelo das a\xE7\xF5es no\
    \ Brasil. \u201CPara que que eu vou tomar risco, quando nos EUA eu tenho juros\
    \ e empresas ainda que crescem a 20% ao ano? E no mercado dom\xE9stico, eu consigo\
    \ investir na renda fixa com taxas perto de 15%\u201D, afirma. \u201CA gente fica\
    \ de olho, mas por enquanto n\xE3o vejo por que estar muito alocado em Brasil\"\
    .Acompanhe o bate-papo e entenda como diversificar os investimentos.Confira tamb\xE9\
    m o epis\xF3dio 160, de 2025, quando Andre Raduan, s\xF3cio da Genoa, analisou\
