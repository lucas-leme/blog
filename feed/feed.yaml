  description: "<div id=\"atacompleta\"><div id=\"ataconteudo\"><h3 class=\"secao\"\
    >A) Atualiza\xE7\xE3o da conjuntura econ\xF4mica e do cen\xE1rio do Copom<sup>1</sup></h3><p\
    \ class=\"paragrafo\">1. O ambiente externo tornou-se mais incerto, em fun\xE7\
    \xE3o do acirramento de conflitos geopol\xEDticos no Oriente M\xE9dio, com reflexos\
    \ nas condi\xE7\xF5es financeiras globais. Tal cen\xE1rio exige cautela por parte\
    \ de pa\xEDses emergentes em ambiente marcado por eleva\xE7\xE3o da volatilidade\
    \ de pre\xE7os de ativos e <i>commodities</i>.</p><p class=\"paragrafo\">2. Em\
    \ rela\xE7\xE3o ao cen\xE1rio dom\xE9stico, o resultado do PIB no \xFAltimo trimestre\
    \ de 2025 evidenciou a desacelera\xE7\xE3o esperada da atividade econ\xF4mica,\
    \ enquanto o mercado de trabalho segue resiliente.</p><p class=\"paragrafo\">3.\
    \ Nas divulga\xE7\xF5es mais recentes, a infla\xE7\xE3o cheia e as medidas subjacentes\
    \ seguiram apresentando algum arrefecimento, mas mantiveram-se acima da meta para\
    \ a infla\xE7\xE3o. As expectativas de infla\xE7\xE3o para 2026 e 2027 apuradas\
    \ pela pesquisa Focus permanecem em valores acima da meta, situando-se em 4,1%\
    \ e 3,8%, respectivamente.</p><h3 class=\"secao\">B) Cen\xE1rios e an\xE1lise\
    \ de riscos</h3><p class=\"paragrafo\">4. A incerteza com rela\xE7\xE3o ao cen\xE1\
    rio externo se elevou consideravelmente. Al\xE9m do agravamento das tens\xF5es\
    \ geopol\xEDticas, novas incertezas com rela\xE7\xE3o \xE0 pol\xEDtica econ\xF4\
    mica dos Estados Unidos colaboraram para tornar esse cen\xE1rio ainda mais incerto.</p><p\
    \ class=\"paragrafo\">5. A atividade econ\xF4mica dom\xE9stica manteve trajet\xF3\
    ria de modera\xE7\xE3o no crescimento, tal como antecipado pelo Comit\xEA. O Comit\xEA\
    \ relembra que o arrefecimento da demanda agregada \xE9 um elemento essencial\
    \ do processo de reequil\xEDbrio entre oferta e demanda da economia e converg\xEA\
    ncia da infla\xE7\xE3o \xE0 meta. A desacelera\xE7\xE3o do PIB no final de 2025,\
    \ mais acentuada em seus componentes c\xEDclicos, tornou evidentes os efeitos\
    \ defasados do per\xEDodo prolongado de pol\xEDtica monet\xE1ria restritiva.</p><p\
    \ class=\"paragrafo\">6. A modera\xE7\xE3o e a pr\xF3pria heterogeneidade das\
    \ trajet\xF3rias de crescimento entre diferentes setores e mercados s\xE3o compat\xED\
    veis com a pol\xEDtica monet\xE1ria em curso. Mercados mais sens\xEDveis \xE0\
    s condi\xE7\xF5es financeiras apresentam maior desacelera\xE7\xE3o, ao passo que\
    \ mercados mais sens\xEDveis \xE0 renda apresentam maior resili\xEAncia. Naturalmente,\
    \ em momentos de inflex\xE3o no ciclo econ\xF4mico, observam-se sinais mistos\
    \ advindos de indicadores econ\xF4micos. Para o primeiro trimestre de 2026, indicadores\
    \ preliminares apontam na dire\xE7\xE3o de uma retomada da atividade econ\xF4\
    mica em rela\xE7\xE3o ao final de 2025. Este movimento \xE9 consistente com proje\xE7\
    \xF5es e expectativas de uma varia\xE7\xE3o positiva do PIB em 2026, ainda que\
    \ menor que em 2025.</p><p class=\"paragrafo\">7. O Comit\xEA segue acompanhando\
    \ detidamente o mercado de trabalho. No per\xEDodo mais recente, a taxa de desemprego\
    \ tem se mantido em patamares historicamente baixos enquanto os rendimentos reais\
    \ m\xE9dios t\xEAm mantido a tend\xEAncia de eleva\xE7\xE3o acima do crescimento\
    \ da produtividade do trabalho. O Comit\xEA segue atento ao debate sobre as dimens\xF5\
    es corrente e estrutural do mercado de trabalho, enfatizando a necessidade do\
    \ aprofundamento dessa an\xE1lise para a avalia\xE7\xE3o dos padr\xF5es de transmiss\xE3\
    o dos n\xEDveis de ocupa\xE7\xE3o para os rendimentos do trabalho e, finalmente,\
    \ para os pre\xE7os dos diversos setores da economia.</p><p class=\"paragrafo\"\
    >8. A pol\xEDtica fiscal tem um impacto de curto prazo, majoritariamente por meio\
    \ de est\xEDmulo \xE0 demanda agregada, e uma dimens\xE3o mais estrutural, que\
    \ tem potencial de afetar a percep\xE7\xE3o sobre a sustentabilidade da d\xED\
    vida e impactar o pr\xEAmio a termo da curva de juros. Uma pol\xEDtica fiscal\
    \ que atue de forma contrac\xEDclica e contribua para a redu\xE7\xE3o do pr\xEA\
    mio de risco favorece a converg\xEAncia da infla\xE7\xE3o \xE0 meta. O Comit\xEA\
    \ manteve a vis\xE3o de que o esmorecimento no esfor\xE7o de reformas estruturais\
    \ e disciplina fiscal, o aumento de cr\xE9dito direcionado e as incertezas sobre\
    \ a estabiliza\xE7\xE3o da d\xEDvida p\xFAblica t\xEAm o potencial de elevar a\
    \ taxa de juros neutra da economia, com impactos delet\xE9rios sobre a pot\xEA\
    ncia da pol\xEDtica monet\xE1ria e, consequentemente, sobre o custo de desinfla\xE7\
    \xE3o em termos de atividade. O Comit\xEA mant\xE9m a firme convic\xE7\xE3o de\
    \ que as pol\xEDticas devem ser previs\xEDveis, cr\xEDveis e antic\xEDclicas.\
    \ Em particular, o debate do Comit\xEA refor\xE7a, novamente, a necessidade de\
    \ pol\xEDticas fiscal e monet\xE1ria harmoniosas.</p><p class=\"paragrafo\">9.\
    \ As expectativas de infla\xE7\xE3o, medidas por diferentes instrumentos e obtidas\
    \ de diferentes grupos de agentes, que seguiam em trajet\xF3ria de decl\xEDnio,\
    \ subiram ap\xF3s o in\xEDcio dos conflitos no Oriente M\xE9dio, permanecendo\
    \ acima da meta de infla\xE7\xE3o em todos os horizontes. Foi ressaltado que o\
    \ custo de desinfla\xE7\xE3o sobre o n\xEDvel de atividade ao longo do tempo \xE9\
    \ maior em ambientes com expectativas desancoradas. O Comit\xEA avalia que perseveran\xE7\
    a, firmeza e serenidade na condu\xE7\xE3o da pol\xEDtica monet\xE1ria favorecer\xE3\
    o a continuidade desse movimento, importante para a converg\xEAncia da infla\xE7\
    \xE3o \xE0 meta com menor custo. A principal conclus\xE3o obtida, e compartilhada\
    \ por todos os membros do Comit\xEA, foi a de que, em um ambiente de expectativas\
    \ desancoradas, como \xE9 o caso do atual, exige-se uma restri\xE7\xE3o monet\xE1\
    ria maior e por mais tempo do que outrora seria apropriado.</p><p class=\"paragrafo\"\
    >10. As leituras recentes at\xE9 o in\xEDcio dos conflitos indicavam algum arrefecimento\
    \ da infla\xE7\xE3o que abrangia tanto o \xEDndice cheio quanto em aberturas e\
    \ medidas subjacentes. A combina\xE7\xE3o de um c\xE2mbio mais apreciado e um\
    \ comportamento mais benigno das <i>commodities</i> nos per\xEDodos recentes contribu\xED\
    a para redu\xE7\xE3o nas infla\xE7\xF5es de bens industrializados e alimentos.\
    \ A infla\xE7\xE3o de servi\xE7os tamb\xE9m apresentava algum arrefecimento, ainda\
    \ que mais resiliente, respondendo a um mercado de trabalho que segue din\xE2\
    mico e a uma atividade que tem apresentado modera\xE7\xE3o gradual. Mant\xE9m-se,\
    \ de um lado, a interpreta\xE7\xE3o de uma infla\xE7\xE3o pressionada pela demanda\
    \ e que requer uma pol\xEDtica monet\xE1ria contracionista e, de outro, a interpreta\xE7\
    \xE3o de que a pol\xEDtica monet\xE1ria tem contribu\xEDdo de forma determinante\
    \ para a desinfla\xE7\xE3o observada.</p><p class=\"paragrafo\">11. O Comit\xEA\
    \ se debru\xE7ou ent\xE3o sobre as proje\xE7\xF5es. No cen\xE1rio de refer\xEA\
    ncia, a trajet\xF3ria para a taxa de juros \xE9 extra\xEDda da pesquisa Focus\
    \ e a taxa de c\xE2mbio parte de R$5,20/US$<sup>2</sup>, evoluindo segundo a paridade\
    \ do poder de compra (PPC). O pre\xE7o do petr\xF3leo segue aproximadamente a\
    \ curva futura pelos pr\xF3ximos seis meses e passa a aumentar 2% ao ano posteriormente,\
    \ conforme governan\xE7a usual. Dada a curva de futuros do Brent observada, essa\
    \ governan\xE7a se traduziu em trajet\xF3ria decrescente ao longo da segunda metade\
    \ do ano, ap\xF3s forte alta no curto prazo. Al\xE9m disso, adota-se a hip\xF3\
    tese de bandeira tarif\xE1ria \u201Camarela\u201D em dezembro de 2026. O Comit\xEA\
    \ continuar\xE1 acompanhando os dados para calibrar e refinar os impactos da medida\
    \ de amplia\xE7\xE3o da isen\xE7\xE3o do imposto de renda.</p><p class=\"paragrafo\"\
    >12. No cen\xE1rio de refer\xEAncia, as proje\xE7\xF5es para a infla\xE7\xE3o\
    \ acumulada em quatro trimestres para 2026 e para o terceiro trimestre de 2027,\
    \ atual horizonte relevante de pol\xEDtica monet\xE1ria, s\xE3o, respectivamente,\
    \ 3,9% e 3,3%.</p><p class=\"paragrafo\">13. Com rela\xE7\xE3o ao balan\xE7o de\
    \ riscos, o Comit\xEA avaliou que os riscos para a infla\xE7\xE3o, tanto de alta\
    \ quanto de baixa, que j\xE1 se encontravam mais elevados do que o usual, se intensificaram\
    \ ap\xF3s o in\xEDcio dos conflitos no Oriente M\xE9dio. Entre os riscos de alta\
    \ para o cen\xE1rio inflacion\xE1rio e as expectativas de infla\xE7\xE3o, destacam-se\
    \ (i) uma desancoragem das expectativas de infla\xE7\xE3o por per\xEDodo mais\
    \ prolongado; (ii) uma maior resili\xEAncia na infla\xE7\xE3o de servi\xE7os do\
    \ que a projetada em fun\xE7\xE3o de um hiato do produto mais positivo; e (iii)\
    \ uma conjun\xE7\xE3o de pol\xEDticas econ\xF4micas externa e interna que tenham\
    \ impacto inflacion\xE1rio maior que o esperado, por exemplo, por meio de uma\
    \ taxa de c\xE2mbio persistentemente mais depreciada. Entre os riscos de baixa,\
    \ ressaltam-se (i) uma eventual desacelera\xE7\xE3o da atividade econ\xF4mica\
    \ dom\xE9stica mais acentuada do que a projetada, tendo impactos sobre o cen\xE1\
    rio de infla\xE7\xE3o; (ii) uma desacelera\xE7\xE3o global mais pronunciada decorrente\
    \ do choque de com\xE9rcio e de um cen\xE1rio de maior incerteza; e (iii) uma\
    \ redu\xE7\xE3o nos pre\xE7os das <i>commodities</i> com efeitos desinflacion\xE1\
    rios. Ap\xF3s debater altera\xE7\xF5es no balan\xE7o de riscos, o Comit\xEA julgou\
    \ apropriado seguir com serenidade e reunir mais informa\xE7\xF5es ao longo do\
    \ tempo, em fun\xE7\xE3o da incerteza elevada em rela\xE7\xE3o \xE0 evolu\xE7\xE3\
    o de seus elementos.</p><h3 class=\"secao\">C) Discuss\xE3o sobre a condu\xE7\xE3\
    o da pol\xEDtica monet\xE1ria</h3><p class=\"paragrafo\">14. O Copom passou ent\xE3\
    o \xE0 discuss\xE3o da condu\xE7\xE3o da pol\xEDtica monet\xE1ria, considerando\
    \ o conjunto de proje\xE7\xF5es analisado, assim como o balan\xE7o de riscos para\
    \ a infla\xE7\xE3o prospectiva.</p><p class=\"paragrafo\">15. Em sua \xFAltima\
    \ reuni\xE3o, o Comit\xEA julgou adequado sinalizar o in\xEDcio de um ciclo de\
    \ calibra\xE7\xE3o da taxa b\xE1sica de juros, baseado nas evid\xEAncias dos impactos\
    \ da pol\xEDtica monet\xE1ria sobre o n\xEDvel de atividade e sobre a infla\xE7\
    \xE3o. Al\xE9m disso, refor\xE7ou que essa calibra\xE7\xE3o da pol\xEDtica monet\xE1\
    ria manteria seu car\xE1ter restritivo, de modo a assegurar a converg\xEAncia\
    \ da infla\xE7\xE3o \xE0 meta. Ap\xF3s considerar que os eventos recentes n\xE3\
    o impediriam a materializa\xE7\xE3o dessa sinaliza\xE7\xE3o, o Comit\xEA analisou\
    \ as op\xE7\xF5es para o ritmo de in\xEDcio do ciclo de calibra\xE7\xE3o da taxa\
    \ b\xE1sica de juros, concluindo que nesse momento a redu\xE7\xE3o de 0,25% \xE9\
    \ a mais adequada. Mantido o compromisso fundamental de garantia da converg\xEA\
    ncia da infla\xE7\xE3o \xE0 meta dentro do horizonte relevante para a pol\xED\
    tica monet\xE1ria, o Comit\xEA estabeleceu que a magnitude e a dura\xE7\xE3o do\
    \ ciclo de calibra\xE7\xE3o ser\xE3o determinadas ao longo do tempo, \xE0 medida\
    \ que novas informa\xE7\xF5es forem incorporadas \xE0s suas an\xE1lises. Essa\
    \ decis\xE3o \xE9 compat\xEDvel com o cen\xE1rio atual, no qual a dura\xE7\xE3\
    o e extens\xE3o dos conflitos geopol\xEDticos, assim como sinais mistos sobre\
    \ o ritmo de desacelera\xE7\xE3o da atividade econ\xF4mica e seus efeitos sobre\
    \ o n\xEDvel de pre\xE7os, dificultam a identifica\xE7\xE3o de tend\xEAncias claras.</p><h3\
    \ class=\"secao\">D) Decis\xE3o de pol\xEDtica monet\xE1ria</h3><p class=\"paragrafo\"\
    >16. O Copom decidiu reduzir a taxa b\xE1sica de juros para 14,75% a.a., e entende\
    \ que essa decis\xE3o \xE9 compat\xEDvel com a estrat\xE9gia de converg\xEAncia\
    \ da infla\xE7\xE3o para o redor da meta ao longo do horizonte relevante. Sem\
    \ preju\xEDzo de seu objetivo fundamental de assegurar a estabilidade de pre\xE7\
    os, essa decis\xE3o tamb\xE9m implica suaviza\xE7\xE3o das flutua\xE7\xF5es do\
    \ n\xEDvel de atividade econ\xF4mica e fomento do pleno emprego.</p><p class=\"\
    paragrafo\">17. No cen\xE1rio atual, caracterizado por forte aumento da incerteza,\
    \ o Comit\xEA reafirma serenidade e cautela na condu\xE7\xE3o da pol\xEDtica monet\xE1\
    ria, de forma que os passos futuros do processo de calibra\xE7\xE3o da taxa b\xE1\
    sica de juros possam incorporar novas informa\xE7\xF5es que aumentem a clareza\
    \ sobre a profundidade e a extens\xE3o dos conflitos no Oriente M\xE9dio, assim\
    \ como seus efeitos diretos e indiretos sobre o n\xEDvel de pre\xE7os ao longo\
    \ do tempo.</p><p class=\"paragrafo\">18. Votaram por essa decis\xE3o os seguintes\
    \ membros do Comit\xEA: Gabriel Muricca Gal\xEDpolo (presidente), Ailton de Aquino\
    \ Santos, Gilneu Francisco Astolfi Vivan, Izabela Moreira Correa, Nilton Jos\xE9\
    \ Schneider David, Paulo Picchetti e Rodrigo Alves Teixeira.</p><p class=\"paragrafo\"\
