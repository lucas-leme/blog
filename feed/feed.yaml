  description: Do banks fail because of runs or because they become insolvent? Answering
    this question is central to understanding financial crises and designing effective
    financial stability policies. Long-run historical evidence reveals that the root
    cause of bank failures is usually insolvency. The importance of bank runs is somewhat
    overstated. Runs matter, but in most cases they trigger or accelerate failure
    at already weak banks, rather than cause otherwise sound banks to fail.
