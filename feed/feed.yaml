  description: "On October 10, 2025, the announcement of a potential additional 100\_\
    percent tariff on Chinese goods drove risk-off moves across equities, Treasuries,\
    \ credit spreads, and digital assets. Digital asset prices fell sharply, trading\
    \ volumes surged, and liquidity vanished from key exchanges. In this post, we\
    \ show how the price shock in digital assets was transmitted and amplified through\
    \ a class of instruments called synthetic stablecoins\u2014crypto assets whose\
    \ structural design turned an external shock into a self-reinforcing deleveraging\
    \ spiral within the crypto ecosystem."
