  description: "The conflict in the Middle East has precipitated a global supply shock\u2014\
    the third in six years following the pandemic in 2020 and Russia\u2019s invasion\
    \ of Ukraine in 2022. The current shock raises the specter of spillovers to the\
    \ U.S. through both prices <em>and</em> physical shortages of goods. A critical\
    \ conduit for spillovers through these channels is via Asian supply chains, especially\
    \ from middle- to lower-middle income countries in southeast Asia, which are key\
    \ suppliers for goods needed for the AI infrastructure build-out in the U.S. These\
    \ countries are also heavily reliant on Middle East energy imports. This post\
    \ examines key factors related to these Asian supply chain vulnerabilities."
