    \ nele.Com mais de 30 anos de experi\xEAncia em cr\xE9dito privado, Urbano fundou\
    \ a Augme Capital em 2018 e conduziu a gestora a quase R$ 4 bilh\xF5es sob gest\xE3\
    o antes de integr\xE1-la \xE0 XP Asset, no ano passado. \u201CGest\xE3o de high\
    \ yield \xE9 muito sangue e suor \u2013 e \xE0s vezes l\xE1grimas, tamb\xE9m\u201D\
    , afirma.No epis\xF3dio, Urbano explica como encontrar boas oportunidades, num\
    \ momento de juros altos e pedidos de recupera\xE7\xE3o judicial. \u201CQuando\
    \ os spreads v\xE3o fechando, cai demais a diferen\xE7a entre high grade e high\
    \ yield\u201D, afirma. \u201CVoc\xEA v\xEA companhias de qualidade mediana de\
    \ cr\xE9dito pagando, \xE0s vezes, muito perto, \xE0s vezes, cem vezes acima de\
    \ uma companhia de qualidade\u201D.O gestor da XP Asset v\xEA potencial no setor\
    \ de FDICs, mas recomenda cautela: \u201CFDIC, podem falar o que quiserem, n\xE3\
    o tem liquidez. O maior problema que eu vejo com essas estruturas s\xE3o as simplifica\xE7\
